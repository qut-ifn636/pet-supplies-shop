name: Petopia CI/CD

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Test
    runs-on: [self-hosted, petopia]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install backend dependencies
        working-directory: ./backend
        run: yarn install

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: yarn install

      - name: Run backend tests
        working-directory: ./backend
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          PORT: ${{ secrets.PORT }}
        run: yarn test

  deploy:
    name: Deploy (${{ matrix.instance }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        instance: [ec2-1, ec2-2]
    runs-on: [self-hosted, "${{ matrix.instance }}"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: false  # Preserve backend/.env so INSTANCE_ID is not erased

      - name: Verify .env exists
        run: test -f backend/.env || (echo "ERROR: backend/.env missing on runner" && exit 1)

      - name: Install backend dependencies
        working-directory: ./backend
        run: yarn install

      - name: Build frontend
        working-directory: ./frontend
        run: |
          yarn install
          yarn build

      - name: Restart backend
        run: pm2 restart petopia-backend
